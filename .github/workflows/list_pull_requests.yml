name: List Latest Open Pull Requests

on:
  workflow_dispatch:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: '0 8 * * *'
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  list-pull-requests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch and report open pull requests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python .github/scripts/list_pull_requests.py

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push report
        run: |
          git add reports/open_prs.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update open pull requests report [skip ci]"
            git push
          fi

      - name: Summary
        if: always()
        run: |
          echo "### Open Pull Requests Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "reports/open_prs.md" ]; then
            cat reports/open_prs.md >> $GITHUB_STEP_SUMMARY
          else
            echo "Report not generated." >> $GITHUB_STEP_SUMMARY
          fi
