version: '3.8'

services:
  supabase:
    image: supabase/postgres:latest
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: example
    volumes:
      - supabase-db:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  mr_thornton_agent:
    image: mrthornton/agent:latest
    environment:
      SUPABASE_URL: http://supabase:5432
      REDIS_URL: redis://redis:6379

volumes:
  supabase-db:
    driver: local
